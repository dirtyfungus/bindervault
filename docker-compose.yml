version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: bindervault_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bindervault}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bindervault_secret}
      POSTGRES_DB: ${POSTGRES_DB:-bindervault}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bindervault}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bindervault_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bindervault_api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-bindervault}:${POSTGRES_PASSWORD:-bindervault_secret}@db:5432/${POSTGRES_DB:-bindervault}
      REDIS_URL: redis://redis:6379
      SECRET_KEY: ${SECRET_KEY:-change_me_in_production_use_openssl_rand_hex_32}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-30}
      SCRYFALL_API_BASE: https://api.scryfall.com
      ENVIRONMENT: ${ENVIRONMENT:-development}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://localhost:80,http://localhost:3000}
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bindervault_worker
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-bindervault}:${POSTGRES_PASSWORD:-bindervault_secret}@db:5432/${POSTGRES_DB:-bindervault}
      REDIS_URL: redis://redis:6379
      SECRET_KEY: ${SECRET_KEY:-change_me_in_production_use_openssl_rand_hex_32}
      SCRYFALL_API_BASE: https://api.scryfall.com
      ENVIRONMENT: ${ENVIRONMENT:-development}
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    entrypoint: ["python", "-m", "app.worker"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost/api}
        VITE_WS_URL: ${VITE_WS_URL:-ws://localhost/ws}
    container_name: bindervault_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  postgres_data:
